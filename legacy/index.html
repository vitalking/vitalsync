<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VITALSYNC</title>
  <meta name="theme-color" content="#08090c">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='none' stroke='%2300e5ff' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%2300e5ff'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/tokens.css">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/components.css">
  <link rel="stylesheet" href="src/css/layout.css">
  <link rel="stylesheet" href="src/css/header.css">
  <link rel="stylesheet" href="src/css/radar.css">
  <link rel="stylesheet" href="src/css/canvas-overlay.css">
  <link rel="stylesheet" href="src/css/sync-engine.css">
  <link rel="stylesheet" href="src/css/timeline.css">
  <link rel="stylesheet" href="src/css/animations.css">
  <link rel="stylesheet" href="src/css/modes.css">
  <style>
    .vs-loader{position:fixed;inset:0;background:var(--vs-bg-void);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .8s ease,visibility .8s ease}
    .vs-loader--hidden{opacity:0;visibility:hidden}
    .vs-loader__logo{font-family:var(--vs-font-primary);font-size:24px;font-weight:700;letter-spacing:.3em;color:var(--vs-text-primary);margin-bottom:24px}
    .vs-loader__bar{width:120px;height:2px;background:var(--vs-bg-surface);border-radius:2px;overflow:hidden}
    .vs-loader__progress{height:100%;background:var(--vs-accent-primary);border-radius:2px;width:0%;animation:loader-fill 1.5s ease-out forwards}
    @keyframes loader-fill{0%{width:0%}60%{width:80%}100%{width:100%}}
  </style>
</head>
<body>
  <div class="vs-loader" id="loader"><div class="vs-loader__logo">VITALSYNC</div><div class="vs-loader__bar"><div class="vs-loader__progress"></div></div></div>
  <div class="vs-ambient-bg"></div>
  <div class="vs-app vs-app--exploration" id="app">
    <header class="vs-header" id="header"></header>
    <aside class="vs-panel-left" id="panel-left"></aside>
    <main class="vs-center" id="center">
      <canvas class="vs-center__canvas" id="main-canvas"></canvas>
      <div class="vs-center__overlay">
        <div class="vs-center__top" id="center-top"></div>
        <div class="vs-center__bottom" id="center-bottom"></div>
      </div>
    </main>
    <aside class="vs-panel-right" id="panel-right"></aside>
    <footer class="vs-timeline" id="timeline"><div class="vs-timeline__inner"><div class="vs-timeline__controls" id="timeline-controls"></div><div class="vs-timeline__track" id="timeline-track"></div></div></footer>
  </div>
  <script src="src/js/utils.js"></script>
  <script src="src/js/data-engine.js"></script>
  <script src="src/js/visual-algorithm.js"></script>
  <script src="src/js/visual-engine.js"></script>
  <script src="src/js/header.js"></script>
  <script src="src/js/radar.js"></script>
  <script src="src/js/sync-engine.js"></script>
  <script src="src/js/timeline.js"></script>
  <script src="src/js/notifications.js"></script>
  <script src="src/js/modes.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
